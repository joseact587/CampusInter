@if (errorService.currentAlert(); as alert) {
  <!-- Alerta global temporal -->
  <div
    class="global-alert"
    [class.global-alert-error]="alert.type === 'error'"
    [class.global-alert-success]="alert.type === 'success'"
    [class.global-alert-info]="alert.type === 'info'"
  >
    <span>{{ alert.message }}</span>
    <button type="button" aria-label="Cerrar alerta" (click)="errorService.clear()">Cerrar</button>
  </div>
}
